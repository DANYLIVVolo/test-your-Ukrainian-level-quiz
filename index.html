<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Quiz</h1>
</header>

<main>
    <div class="main">

        <h3>Перевір свій рівень української</h3>

        <p>Рекорд: <span class="r">0</span></p>
        <p>Рахунок: <span class="s">0</span></p>

        <div class="levels">
            <p>Складність</p>

            <button class="easy">Легко</button>
            <button class="medium">Середньо</button>
            <button class="hard">Важко</button>
        </div>

        <div class="question">

            <p class="progress"></p>

            <p>Час: <span class="timer">15</span></p>

            <p class="q"></p>

            <div class="answers"></div>

        </div>

    </div>
</main>

<script src="script.js"></script>

</body>
</html>
